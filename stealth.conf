# stealth.conf - ProxyChains-Windows configuration for Tor
# --------------------------------------------------------

# 1. Choose Chaining Mode: 
# "dynamic_chain" is recommended for stealth. It skips dead proxies in the chain.
dynamic_chain

# 2. DNS Stealth:
# "proxy_dns" forces DNS resolution through the proxy, preventing your ISP 
# from seeing which domains you are connecting to.
proxy_dns

# 3. Connection Timeouts:
tcp_read_time_out 15000
tcp_connect_time_out 8000

# 4. Proxy List:
# Route all traffic to the local Tor SOCKS5 port.
[ProxyList]
socks5  127.0.0.1  9050
